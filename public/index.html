<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Custom activity template</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/design-system/2.8.3/styles/salesforce-lightning-design-system.min.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <link rel="icon" type="image/png" href="./img/GCP_Image.png" sizes="32x32">
    <script data-main="js/main" src="js/require.js"></script>

</head>

<body>

    <div class="container-fluid" id="step1">
        <div id="warning" class="" style="display: none;">
            Existe un Error
        </div>
        <div id="main-form" class="" style="display: block;"></div>
            <p><small id="version"></small></p>
            <h1>Create a notification PORTAL WEB</h1>
            <p>This Activity creates a notification.</p>
            <table>
                <tr>
                    <td><label>ID Corporativo</label></td>
                    <td><input type="text" id="id_corp"/></td>
                </tr>
                <tr>
                    <td><label>Email</label></td>
                    <td><input id="email"></input></td>
                </tr>
                <tr>
                    <td><label>Event Date</label></td>
                    <td><input type="text" id="event_date"/></td>
                </tr>
                <tr>
                    <td><label>Batch Id</label></td>
                    <td><input type="text" id="batchid"/></td>
                </tr>
                <tr>
                    <td><label>Job Id</label></td>
                    <td><input type="text" id="jobid"/></td>
                </tr>
                <tr>
                    <td><label>Account Id</label></td>
                    <td><input type="text" id="accountid"/></td>
                </tr>
                <tr>
                    <div class="slds-form-element slds-m-bottom_small">
                        <label class="slds-form-element__label" for="packageid">Select Label</label>
                        <div class="slds-form-element__control">
                          <div class="slds-select_container">
                            <select id="packageid" class="slds-select">
                            </select>
                          </div>
                        </div>
                    </div>
                </tr>
            </table>
        </div>
    </div>
    <div class="container-fluid" id="step2">
    </div>
</body>

</html>
